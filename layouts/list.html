{{ define "main" }}
<article> 
  <ul class = "post-list"> 
  {{ range .Pages.ByPublishDate.Reverse }}
    <li>
      <h3>
        <a href="{{ .RelPermalink }}">
        {{ .Title }}
        </a>
      </h3>
      <div class = "post-time">
        <time> 
          {{ .PublishDate.Format "2 January, 2006" }} 
        </time>
      </div>
      <p>{{ .Summary | truncate 200 }}</p>
    </li>
  {{ end }}
  </ul>
</article>
{{ end }}
